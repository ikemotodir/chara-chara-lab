<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>すべての記事｜CHARA CHARA LAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--pink:#D6336C;--yellow:#FFD43B;--ink:#2b2b2b;--muted:#a89aa0;--line:#f0e6ea;--tint:#fbf3f6;
--log-bg:#fbe3ec;--log-border:#f5cdda;--theory-bg:#fff7d6;--theory-ink:#8a6d00;--theory-border:#ffe8a0;--real-bg:#f2f0f1;--real-border:#e5e0e2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Zen Kaku Gothic New',sans-serif;color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
::selection{background:var(--yellow);color:var(--ink)}
.site-head{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.head-in{max-width:1120px;margin:0 auto;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.logo{display:flex;align-items:baseline;gap:12px}
.logo b{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:22px;letter-spacing:.02em;color:var(--pink)}
.logo small{font-size:11px;letter-spacing:.16em;color:#b9a9af;font-weight:500}
nav{display:flex;align-items:center;gap:30px}
nav a{font-size:14px;font-weight:500;color:#4a4a4a}
nav .pill{font-size:13px;font-weight:700;color:#fff;background:var(--pink);padding:10px 20px;border-radius:999px}
.wrap{max-width:1120px;margin:0 auto;padding:56px 32px 80px}
.sec-head{margin-bottom:36px}
.sec-head .en{margin:0 0 8px;font-size:13px;font-weight:700;letter-spacing:.14em;color:var(--pink)}
.sec-head h1{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:34px;margin:0;color:var(--ink)}
.cards{list-style:none;display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
.card a{display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;transition:transform .18s ease,box-shadow .18s ease;height:100%}
.card a:hover{transform:translateY(-4px);box-shadow:0 16px 30px rgba(214,51,108,.12)}
.cover{position:relative;height:180px;display:flex;align-items:center;justify-content:center}
.cover .glyph{font-size:56px;filter:drop-shadow(0 6px 10px rgba(43,27,35,.12))}
.cover.log{background:var(--log-bg)}
.cover.theory{background:var(--theory-bg)}
.cover.real{background:#efe9eb}
.cover.world{background:var(--log-bg)}
.badge{position:absolute;top:12px;left:12px;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;border:1px solid}
.badge.log{background:var(--pink);color:#fff;border-color:var(--pink)}
.badge.theory{background:var(--theory-bg);color:var(--theory-ink);border-color:var(--theory-border)}
.badge.real{background:var(--ink);color:#fff;border-color:var(--ink)}
.badge.world{background:#fff;color:var(--pink);border-color:var(--log-border)}
.card-body{padding:20px 22px 24px;display:flex;flex-direction:column;gap:12px;flex:1}
.card-body h3{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:17px;line-height:1.55;margin:0;color:var(--ink)}
.card-body time{margin-top:auto;font-size:12.5px;color:var(--muted);font-weight:500}
.back{margin-top:44px;font-size:13.5px}
.back a{color:var(--pink);font-weight:700}
footer{background:#fff;color:#8a8a8a;border-top:1px solid var(--line)}
.foot-in{max-width:1120px;margin:0 auto;padding:40px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.foot-in .f-logo{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:18px;color:var(--pink);margin:0}
.foot-in p{margin:0;font-size:12px;color:#b5a9af}
@media(max-width:860px){nav a:not(.pill){display:none}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="site-head">
  <div class="head-in">
    <a class="logo" href="index.html"><b>CHARA CHARA LAB</b><small>by STUDIO PATTI</small></a>
    <nav>
      <a href="index.html#articles">トップ</a>
      <a class="pill" href="index.html#consult">相談する</a>
    </nav>
  </div>
</header>
<main class="wrap">
  <div class="sec-head">
    <p class="en">ALL ARTICLES</p>
    <h1>すべての実験レポート</h1>
  </div>
  <ul class="cards">

  </ul>
  <p class="back"><a href="index.html">← トップへ戻る</a></p>
</main>
<footer>
  <div class="foot-in">
    <p class="f-logo">CHARA CHARA LAB</p>
    <p>キャラクターの実験室 ／ STUDIO PATTI　© 2026 STUDIO PATTI. All rights reserved.</p>
  </div>
</footer>
</body>
</html>
